<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>좌표 그리드</title>
<style>
  html,body{margin:0;padding:0;background:#11161b;height:100%;
    font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif;color:#e8edf2;}
  #wrap{position:relative;width:100vw;max-width:100vw;}
  #bg{display:block;width:100%;height:auto;}
  #grid{position:absolute;inset:0;width:100%;height:100%;}
  #read{position:fixed;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));text-align:center;
    font-size:18px;letter-spacing:1px;z-index:5;}
  #read b{color:#7fd1ff;font-size:22px;}
  #hint{font-size:12.5px;opacity:0.6;margin-top:4px;}
  .lbl{font-size:11px;fill:#cfe3f2;opacity:0.85;}
  .gl{stroke:rgba(140,200,255,0.45);stroke-width:1;}
  .gl5{stroke:rgba(255,210,120,0.8);stroke-width:1.4;}
  #cross line{stroke:#ff5d5d;stroke-width:1.5;}
  #dot{fill:#ff5d5d;}
</style>
</head>
<body>
<div id="wrap">
  <img id="bg" src="rain.png" alt="비 오는 거리" />
  <svg id="grid" viewBox="0 0 100 56" preserveAspectRatio="none"></svg>
</div>
<div id="read">탭/클릭한 곳: <b id="val">— , —</b><div id="hint">길 위 시작 지점을 누르면 좌표가 나와요. 그 값을 알려주세요.</div></div>
<script>
(function(){
  const svg=document.getElementById('grid');
  const VW=100, VH=56; // viewBox 비율(이미지 가로세로 근사). 라벨은 %로만 사용.
  let h='';
  // 세로선 (가로 0~100%)
  for(let x=0;x<=100;x+=10){
    const cls = (x%50===0)?'gl5':'gl';
    h+=`<line class="${cls}" x1="${x/100*VW}" y1="0" x2="${x/100*VW}" y2="${VH}"/>`;
    h+=`<text class="lbl" x="${x/100*VW+0.4}" y="2.6">${x}</text>`;
  }
  // 가로선 (위에서 0~100%)
  for(let y=0;y<=100;y+=10){
    const cls = (y%50===0)?'gl5':'gl';
    const yy=y/100*VH;
    h+=`<line class="${cls}" x1="0" y1="${yy}" x2="${VW}" y2="${yy}"/>`;
    h+=`<text class="lbl" x="0.4" y="${yy+2.4}">${y}</text>`;
  }
  h+=`<g id="cross" style="display:none"><line id="cv"/><line id="ch"/><circle id="dot" r="0.9"/></g>`;
  svg.innerHTML=h;

  const wrap=document.getElementById('wrap');
  const val=document.getElementById('val');
  const cross=document.getElementById('cross');
  const cv=document.getElementById('cv'), ch=document.getElementById('ch'), dot=document.getElementById('dot');
  function pick(e){
    const r=wrap.getBoundingClientRect();
    const px=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const py=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    const xp=Math.max(0,Math.min(100,Math.round(px/r.width*100)));
    const yp=Math.max(0,Math.min(100,Math.round(py/r.height*100)));
    val.textContent=`가로 ${xp}% , 세로 ${yp}%`;
    const X=xp/100*VW, Y=yp/100*VH;
    cv.setAttribute('x1',X);cv.setAttribute('y1',0);cv.setAttribute('x2',X);cv.setAttribute('y2',VH);
    ch.setAttribute('x1',0);ch.setAttribute('y1',Y);ch.setAttribute('x2',VW);ch.setAttribute('y2',Y);
    dot.setAttribute('cx',X);dot.setAttribute('cy',Y);
    cross.style.display='';
  }
  wrap.addEventListener('click',pick);
  wrap.addEventListener('touchstart',pick,{passive:true});
})();
</script>
</body>
</html>
