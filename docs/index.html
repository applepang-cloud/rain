<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>비 오는 거리</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a1f24; overflow:hidden; }
  .bg {
    position:fixed; inset:0; background-size:cover; background-position:center;
    opacity:0; transform:scale(1); transform-origin:center center;
    transition:opacity 1.92s ease, transform 1.92s ease; will-change:opacity,transform;
  }
  #mood {
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(120% 80% at 60% 35%, rgba(20,30,38,0) 40%, rgba(10,16,22,0.5) 100%);
    mix-blend-mode:multiply;
  }
  #flash { position:fixed; inset:0; pointer-events:none; background:rgba(200,225,255,1); opacity:0; }
  #cv { position:fixed; inset:0; display:block; }

  /* 하트 (white & black) */
  #heart { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
           pointer-events:none; z-index:7; }
  #heart svg { width:34vmin; height:34vmin; transform:scale(0.2); opacity:0;
               transition:transform 1.44s cubic-bezier(.2,1.3,.4,1), opacity 1.44s ease; }
  #heart.show svg { transform:scale(1); opacity:1; }

  /* 하단 자막 */
  #subtitle {
    position:fixed; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); color:#fff;
    font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif;
    font-size:20px; letter-spacing:1px; line-height:1.5; text-align:center;
    padding:22px 18px calc(22px + env(safe-area-inset-bottom));
    opacity:0; transition:opacity 1.28s ease; pointer-events:none; z-index:8;
    text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }
  #subtitle .caret { display:inline-block; width:2px; margin-left:2px; background:#fff;
    vertical-align:-2px; height:1em; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  /* 터치 안내 */
  #touch {
    position:fixed; left:0; right:0; bottom:92px; text-align:center; z-index:9;
    font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif; color:#fff;
    font-size:15px; letter-spacing:3px; opacity:0; transition:opacity 0.5s ease;
    pointer-events:none; text-shadow:0 1px 4px rgba(0,0,0,0.7);
  }
  #touch.show { opacity:1; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:0.45; } 50%{ opacity:1; } }
  #touch .dot { display:inline-block; margin-left:8px; opacity:0.8; }

  #start {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(8,12,16,0.55); cursor:pointer; z-index:10;
    font-family:-apple-system,'Segoe UI',sans-serif; color:#cdd6df;
  }
  #start .box { text-align:center; padding:24px 30px; border:1px solid rgba(205,214,223,0.25);
    border-radius:14px; background:rgba(15,22,28,0.55); }
  #start .t { font-size:18px; letter-spacing:2px; opacity:0.92; }
  #start .s { font-size:12.5px; margin-top:10px; opacity:0.55; }
</style>
</head>
<body>
  <div id="bgA" class="bg"></div>
  <div id="bgB" class="bg"></div>
  <canvas id="cv"></canvas>
  <div id="mood"></div>
  <div id="flash"></div>
  <div id="heart">
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="leftHalf"><rect x="0" y="0" width="50" height="90"/></clipPath>
        <clipPath id="rightHalf"><rect x="50" y="0" width="50" height="90"/></clipPath>
      </defs>
      <path id="hpathL" d="M50 84 C 12 56, 2 30, 18 14 C 32 0, 48 10, 50 24 C 52 10, 68 0, 82 14 C 98 30, 88 56, 50 84 Z" fill="#ffffff" clip-path="url(#leftHalf)"/>
      <path id="hpathR" d="M50 84 C 12 56, 2 30, 18 14 C 32 0, 48 10, 50 24 C 52 10, 68 0, 82 14 C 98 30, 88 56, 50 84 Z" fill="#101319" clip-path="url(#rightHalf)"/>
      <path d="M50 84 C 12 56, 2 30, 18 14 C 32 0, 48 10, 50 24 C 52 10, 68 0, 82 14 C 98 30, 88 56, 50 84 Z" fill="none" stroke="rgba(150,170,190,0.5)" stroke-width="1.2"/>
    </svg>
  </div>
  <div id="subtitle"><span id="subtext"></span><span class="caret" id="caret" style="display:none"></span></div>
  <div id="touch">터치<span class="dot">▸</span></div>
  <div id="start"><div class="box">
    <div class="t">비 오는 거리</div>
    <div class="s">화면을 눌러 시작</div>
  </div></div>

<script src="three.min.js"></script>
<script>
(function(){
  'use strict';

  const canvas = document.getElementById('cv');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  const scene = new THREE.Scene();
  let W = window.innerWidth, H = window.innerHeight;
  const camera = new THREE.OrthographicCamera(0, W, H, 0, -1000, 1000);
  function minF(){ return Math.min(W,H)/620; }
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    renderer.setSize(W, H);
    camera.left=0; camera.right=W; camera.top=H; camera.bottom=0; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  const lerp=(a,b,t)=>a+(b-a)*t;
  const easeInOut=t=> t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

  // ---------- 비 ----------
  const RAIN_COUNT=520, rainGeo=new THREE.BufferGeometry(), rPos=new Float32Array(RAIN_COUNT*6), rData=[];
  function seedDrop(i,ry){ const x=Math.random()*(W+200)-100, y=ry?Math.random()*H:H+Math.random()*120;
    rData[i]={x,y,len:14+Math.random()*26,speed:620+Math.random()*620,slant:2+Math.random()*3}; }
  for(let i=0;i<RAIN_COUNT;i++) seedDrop(i,true);
  rainGeo.setAttribute('position',new THREE.BufferAttribute(rPos,3));
  const rain=new THREE.LineSegments(rainGeo,new THREE.LineBasicMaterial({color:0xbfcad6,transparent:true,opacity:0.32}));
  scene.add(rain);
  function updateRain(dt){ for(let i=0;i<RAIN_COUNT;i++){ const d=rData[i]; d.y-=d.speed*dt; d.x-=d.slant*d.speed*dt*0.06;
    if(d.y+d.len<0||d.x<-120) seedDrop(i,false); const o=i*6;
    rPos[o]=d.x;rPos[o+1]=d.y;rPos[o+2]=0; rPos[o+3]=d.x-d.slant;rPos[o+4]=d.y+d.len;rPos[o+5]=0; }
    rainGeo.attributes.position.needsUpdate=true; }

  // ---------- 바닥 튀김 ----------
  const SPL=60, splGeo=new THREE.BufferGeometry(), sPos=new Float32Array(SPL*3), sData=[];
  function seedSplash(i){ sData[i]={x:Math.random()*W, baseY:H*0.05+Math.random()*H*0.3, t:Math.random(), life:0.25+Math.random()*0.25}; }
  for(let i=0;i<SPL;i++) seedSplash(i);
  splGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
  const splash=new THREE.Points(splGeo,new THREE.PointsMaterial({color:0xcdd8e2,size:2.4,transparent:true,opacity:0.45}));
  scene.add(splash);
  function updateSplash(dt){ for(let i=0;i<SPL;i++){ const s=sData[i]; s.t+=dt; if(s.t>s.life){seedSplash(i);s.t=0;}
    const p=s.t/s.life,o=i*3; sPos[o]=s.x; sPos[o+1]=s.baseY+Math.sin(p*Math.PI)*8; sPos[o+2]=0; }
    splGeo.attributes.position.needsUpdate=true; }

  // ---------- 실루엣 캐릭터 ----------
  function roundedBlob(w,h,mat){ const s=new THREE.Shape(), r=Math.min(w,h)*0.42, x=-w/2,y=-h/2;
    s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r); s.lineTo(x+w,y+h-r);
    s.quadraticCurveTo(x+w,y+h,x+w-r,y+h); s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);
    s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y);
    return new THREE.Mesh(new THREE.ShapeGeometry(s),mat); }
  function trapezoid(top,bot,h,mat){ const s=new THREE.Shape();
    s.moveTo(-top/2,h); s.lineTo(top/2,h); s.lineTo(bot/2,0); s.lineTo(-bot/2,0); s.closePath();
    return new THREE.Mesh(new THREE.ShapeGeometry(s),mat); }

  function makeChar(colorHex, female){
    const mat=new THREE.MeshBasicMaterial({color:colorHex,transparent:true,opacity:0});
    const group=new THREE.Group(); scene.add(group);
    const upper=new THREE.Group();
    const torso = female ? trapezoid(30,46,64,mat) : roundedBlob(34,60,mat);
    if(!female) torso.position.y=60;            // blob 기준 원점 보정
    const torsoY = female ? 0 : 30;             // 다리 연결 기준
    const head = roundedBlob(female?24:26, female?26:28, mat); head.position.y= female?94:104;
    if(female){ // 머리카락(어깨까지)
      const hair=roundedBlob(30,40,mat); hair.position.y=88; hair.position.z=-1; upper.add(hair); }
    function limb(w,len){ const g=new THREE.Group(); const m=roundedBlob(w,len,mat); m.position.y=-len/2; g.add(m); return g; }
    const legL=limb(female?12:14,50), legR=limb(female?12:14,50);
    legL.position.set(-8,34,0); legR.position.set(8,34,0);
    const armL=limb(female?9:11,44), armR=limb(female?9:11,44);
    armL.position.set(female?-16:-18,female?84:92,0); armL.position.z=-1; armR.position.set(female?16:18,female?84:92,0);
    upper.add(armL,armR,torso,head);
    group.add(legL,legR,upper);
    group.visible=false;
    return { group,upper,torso,head,legL,legR,armL,armR,mat,female,
      x:W*0.5,y:H*0.1,scale:0.0001, tx:0.5,ty:0.1,tscale:0.9, tOpacity:0,
      phase:Math.random()*6, lookAround:false, armSpread:0,tArmSpread:0,
      droop:0,tDroop:0, hug:0,tHug:0 };
  }
  const man   = makeChar(0x0c1116, false);
  const woman = makeChar(0xf2f4f7, true);

  function updateChar(c,dt){
    const k=1-Math.pow(0.001,dt/SLOW); // 부드러운 추적 (감속)
    const px=c.tx*W, py=c.ty*H, ps=c.tscale*minF();
    const moving = Math.abs(c.x-px) > 1.2 || Math.abs(c.y-py) > 1.2;
    c.x=lerp(c.x,px,k); c.y=lerp(c.y,py,k); c.scale=lerp(c.scale,ps,k);
    c.mat.opacity=lerp(c.mat.opacity,c.tOpacity,k*0.9);
    c.group.visible = c.mat.opacity>0.02;
    c.group.position.set(c.x,c.y,0); c.group.scale.set(c.scale,c.scale,1);

    if(moving){ c.phase+=dt*5; const sw=Math.sin(c.phase);
      c.legL.rotation.z=sw*0.5; c.legR.rotation.z=-sw*0.5;
      if(c.tArmSpread<0.05&&c.tHug<0.05){ c.armL.rotation.z=-sw*0.3; c.armR.rotation.z=sw*0.3; }
      const bob=Math.abs(Math.cos(c.phase))*5; c.upper.position.y=lerp(c.upper.position.y,-bob,0.5);
    } else {
      c.legL.rotation.z=lerp(c.legL.rotation.z,0,0.2); c.legR.rotation.z=lerp(c.legR.rotation.z,0,0.2);
      c.upper.position.y=lerp(c.upper.position.y, -6*c.droop, 0.2);
    }

    // 고개 떨굼 / 두리번 / 기본
    c.droop=lerp(c.droop,c.tDroop,k);
    if(c.lookAround){ c.head.rotation.z = Math.sin(c.phase*0.9+1)*0.4; }
    else { c.head.rotation.z = lerp(c.head.rotation.z, -0.05 - 0.55*c.droop, 0.15); }
    c.upper.rotation.z = lerp(c.upper.rotation.z, 0.12*c.droop, 0.12);
    c.head.position.y = (c.female?94:104) - 16*c.droop;

    // 팔 벌리기 / 포옹
    c.armSpread=lerp(c.armSpread,c.tArmSpread,k); c.hug=lerp(c.hug,c.tHug,k);
    if(c.tArmSpread>0.05 || c.armSpread>0.05){
      c.armL.rotation.z = lerp(c.armL.rotation.z,  1.15*c.armSpread, 0.2);
      c.armR.rotation.z = lerp(c.armR.rotation.z, -1.15*c.armSpread, 0.2);
    }
    if(c.tHug>0.05 || c.hug>0.05){
      c.armL.rotation.z = lerp(c.armL.rotation.z, -0.7*c.hug, 0.2);
      c.armR.rotation.z = lerp(c.armR.rotation.z,  0.7*c.hug, 0.2);
    }
  }

  // ---------- 배경 크로스페이드 (페이드아웃+축소 / 페이드인+확대) ----------
  let bgActive = document.getElementById('bgA');
  let bgOther  = document.getElementById('bgB');
  function setBackground(url, instant){
    if(instant){ bgActive.style.transition='none'; bgActive.style.backgroundImage=`url('${url}')`;
      bgActive.style.opacity='1'; bgActive.style.transform='scale(1)';
      void bgActive.offsetWidth; bgActive.style.transition=''; return; }
    const nxt=bgOther, cur=bgActive;
    nxt.style.transition='none';
    nxt.style.backgroundImage=`url('${url}')`;
    nxt.style.opacity='0'; nxt.style.transform='scale(0.9)';
    void nxt.offsetWidth; // reflow
    nxt.style.transition='opacity 1.92s ease, transform 1.92s ease';
    nxt.style.opacity='1'; nxt.style.transform='scale(1)';   // 페이드인 + 확대
    cur.style.opacity='0'; cur.style.transform='scale(0.85)'; // 페이드아웃 + 축소
    bgActive=nxt; bgOther=cur;
  }

  // ---------- 자막 (타자기) ----------
  const subtitleEl=document.getElementById('subtitle'), subtextEl=document.getElementById('subtext'), caretEl=document.getElementById('caret');
  let typeTimer=null;
  function showSubtitle(text){
    if(typeTimer){ clearTimeout(typeTimer); typeTimer=null; }
    subtitleEl.style.opacity='1'; caretEl.style.display='inline-block';
    let i=0; const tick=()=>{ if(i<=text.length){ subtextEl.textContent=text.slice(0,i); i++; typeTimer=setTimeout(tick,240); }
      else { typeTimer=setTimeout(()=>{ caretEl.style.display='none'; },2240); } };
    tick();
  }
  function hideSubtitle(){ subtitleEl.style.opacity='0'; }

  // ---------- 터치 안내 ----------
  const touchEl=document.getElementById('touch');
  let touchReady=false;
  function showTouch(){ touchReady=true; touchEl.classList.add('show'); }
  function hideTouch(){ touchReady=false; touchEl.classList.remove('show'); }

  // ---------- 하트 ----------
  const heartEl=document.getElementById('heart');

  // ---------- 오디오 ----------
  let audioCtx=null, noiseBuf=null, bgm=null;
  function startAudio(){ if(audioCtx) return;
    bgm=new Audio('rain.mp3'); bgm.loop=true; bgm.volume=0.85; bgm.play().catch(()=>{});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)(); const sr=audioCtx.sampleRate;
    noiseBuf=audioCtx.createBuffer(1,2*sr,sr); const nd=noiseBuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1; scheduleThunder(); }
  function thunder(){ if(!audioCtx){ lightning(0.8); return; }
    const ctx=audioCtx,t0=ctx.currentTime, tg=ctx.createGain(); tg.gain.value=0; tg.connect(ctx.destination);
    const rumble=ctx.createOscillator(); rumble.type='sine'; rumble.frequency.setValueAtTime(70,t0);
    rumble.frequency.exponentialRampToValueAtTime(28,t0+1.6); const rg=ctx.createGain(); rg.gain.value=0.9; rumble.connect(rg); rg.connect(tg);
    const nb=ctx.createBufferSource(); nb.buffer=noiseBuf; nb.loop=true; const nf=ctx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=900;
    const ng=ctx.createGain(); ng.gain.value=0.7; nb.connect(nf); nf.connect(ng); ng.connect(tg); nb.start();
    const peak=0.5+Math.random()*0.25; tg.gain.setValueAtTime(0,t0); tg.gain.linearRampToValueAtTime(peak,t0+0.05);
    tg.gain.exponentialRampToValueAtTime(0.0008,t0+2.4+Math.random()); ng.gain.exponentialRampToValueAtTime(0.02,t0+0.4);
    rumble.start(t0); rumble.stop(t0+3.2); nb.stop(t0+2.0); lightning(peak); }
  const flashEl=document.getElementById('flash');
  function lightning(it){ it=it||0.7; const seq=[0,0.9,0.1,0.7,0]; let t=0;
    seq.forEach((v,i)=>{ setTimeout(()=>{ flashEl.style.opacity=(v*it*0.8).toFixed(3); },t); t+=(i%2===0)?60:90; });
    setTimeout(()=>{ flashEl.style.opacity=0; },t+120); }
  function scheduleThunder(){ const w=9000+Math.random()*16000; setTimeout(()=>{ thunder(); scheduleThunder(); },w); }

  // ---------- 인트로 보행 (scene 0) ----------
  const INTRO = { startX:0.48, startY:0.14, startScale:0.55, endX:0.47, endY:0.06, endScale:1.20 };
  const SLOW = 1.6;            // 연출 속도 60% 감속 (지속시간 ×1.6)
  const T = (ms)=> ms*SLOW;    // setTimeout 지연 감속
  let scene_n = 0;          // 0=인트로, 1..7=시퀀스
  let introProgress=0, introPhase='walk', introStop=0, introSubShown=false, introDone=false;
  const INTRO_SPEED=0.085;

  function updateIntro(dt){
    man.mat.opacity = Math.min(1, man.mat.opacity + dt*2.2/SLOW); // 등장 페이드인(감속)
    if(introPhase==='walk'){ introProgress+=dt*INTRO_SPEED/SLOW; if(introProgress>=1){ introProgress=1; introPhase='stop'; introStop=0; } }
    const p=introProgress;
    man.tx=lerp(INTRO.startX,INTRO.endX,p); man.ty=lerp(INTRO.startY,INTRO.endY,p);
    man.tscale=lerp(INTRO.startScale,INTRO.endScale,p); man.tOpacity=1;
    // 이동 자체는 updateChar의 추적이 처리하지만, 인트로는 즉시 따라가도록 강제
    man.x=man.tx*W; man.y=man.ty*H; man.scale=man.tscale*minF();
    if(introPhase==='walk'){
      man.phase+=dt*4.2/SLOW; const sw=Math.sin(man.phase);
      man.legL.rotation.z=sw*0.5; man.legR.rotation.z=-sw*0.5;
      man.armL.rotation.z=-sw*0.32; man.armR.rotation.z=sw*0.32;
      const bob=Math.abs(Math.cos(man.phase))*5; man.upper.position.y=-bob; man.head.rotation.z=Math.sin(man.phase*0.5)*0.04-0.06;
    } else {
      introStop+=dt; man.tDroop=1; man.droop=easeInOut(Math.min(introStop/(1.6*SLOW),1));
      man.legL.rotation.z=lerp(man.legL.rotation.z,0,0.18); man.legR.rotation.z=lerp(man.legR.rotation.z,0,0.18);
      man.upper.position.y=lerp(man.upper.position.y,-6*man.droop,0.2);
      man.head.rotation.z=-0.06-0.55*man.droop; man.upper.rotation.z=0.12*man.droop;
      man.head.position.y=104-16*man.droop;
      if(!introSubShown && introStop>1.0*SLOW){ introSubShown=true; showSubtitle('나만 혼자인 것 같다'); }
      if(!introDone && introStop>3.0*SLOW){ introDone=true; showTouch(); }
    }
    man.group.position.set(man.x,man.y,0); man.group.scale.set(man.scale,man.scale,1);
    man.group.visible=true;
  }

  // ---------- 시퀀스 (scene 1..7) ----------
  let sceneTimers=[];
  function sT(fn,ms){ const id=setTimeout(fn,ms); sceneTimers.push(id); return id; }
  function clearSceneTimers(){ sceneTimers.forEach(clearTimeout); sceneTimers=[]; }

  function enterScene(n){
    scene_n=n; clearSceneTimers(); hideTouch(); hideSubtitle();
    if(n>=1) man.lookAround=false;
    switch(n){
      case 1: // 이미지1 — 남자 두리번, "혼자가 아니에요"
        setBackground('1.png');
        man.tDroop=0; man.lookAround=true; man.tx=0.50; man.ty=0.12; man.tscale=1.05; man.tOpacity=1;
        woman.tOpacity=0; woman.group.visible=false;
        sT(()=>showSubtitle('혼자가 아니에요'),T(700));
        sT(showTouch,T(2600));
        break;
      case 2: // 이미지2 — 반대편에서 하얀 여자 등장(걸어나옴)
        setBackground('2.png');
        man.lookAround=false; man.tx=0.64; man.ty=0.12; man.tscale=1.05;
        woman.group.visible=true; woman.x=-0.1*W; woman.y=0.12*H; woman.scale=1.0*minF();
        woman.tx=0.40; woman.ty=0.12; woman.tscale=1.05; woman.tOpacity=1;
        sT(showTouch,T(3200));
        break;
      case 3: // 이미지3 — 둘이 더 가까이
        setBackground('3.png');
        man.tx=0.58; man.ty=0.11; man.tscale=1.1;
        woman.tx=0.45; woman.ty=0.11; woman.tscale=1.1;
        sT(showTouch,T(2200));
        break;
      case 4: // 이미지4 — 여자 팔 벌리며 설명
        setBackground('4.png');
        man.tx=0.58; man.ty=0.11; man.tscale=1.1;
        woman.tx=0.44; woman.ty=0.11; woman.tscale=1.1; woman.tArmSpread=1;
        sT(()=>showSubtitle('우린 하나였어요. 원래'),T(700));
        sT(showTouch,T(2800));
        break;
      case 5: // 이미지5 — 여자가 남자를 안아줌
        setBackground('5.png');
        woman.tArmSpread=0; woman.tHug=1;
        man.tx=0.545; man.ty=0.11; man.tscale=1.12;
        woman.tx=0.50; woman.ty=0.11; woman.tscale=1.12;
        sT(showTouch,T(2400));
        break;
      case 6: // 이미지6 — 둘이 하나로 합쳐짐
        setBackground('6.png');
        man.tx=0.52; man.ty=0.11; man.tscale=1.15;
        woman.tx=0.52; woman.ty=0.11; woman.tscale=1.15;
        sT(()=>{ woman.tOpacity=0; man.tOpacity=0; },T(2400)); // 겹쳐지며 사라짐
        sT(showTouch,T(3400));
        break;
      case 7: // 하얗고 검은 하트
        // 배경은 6 유지. 캐릭터 숨기고 하트 등장.
        man.tOpacity=0; woman.tOpacity=0;
        heartEl.style.display='flex'; void heartEl.offsetWidth; heartEl.classList.add('show');
        showSubtitle('우리는 하나야');
        break;
    }
  }
  function nextScene(){ if(scene_n<7) enterScene(scene_n+1); }

  // ---------- 루프 ----------
  let last=performance.now();
  function loop(now){ const dt=Math.min((now-last)/1000,0.05); last=now;
    updateRain(dt); updateSplash(dt);
    if(scene_n===0){ updateIntro(dt); updateChar(woman,dt); }
    else { updateChar(man,dt); updateChar(woman,dt); }
    renderer.render(scene,camera); requestAnimationFrame(loop);
  }
  resize(); setBackground('rain.png', true);
  man.tOpacity=1; man.x=INTRO.startX*W; man.y=INTRO.startY*H; man.scale=INTRO.startScale*minF();
  requestAnimationFrame(loop);

  // 디버그 훅
  window.__RAIN = {
    thunderNow:thunder, next:nextScene, goto:enterScene,
    introStep:(dt)=>updateIntro(dt||0.05),
    step:(dt)=>{ dt=dt||0.05; if(scene_n===0){ updateIntro(dt); updateChar(woman,dt); } else { updateChar(man,dt); updateChar(woman,dt); } },
    forceTouch:showTouch,
    state:()=>({ scene:scene_n, touchReady, subtitle:subtextEl.textContent,
      man:{x:+(man.x/W).toFixed(2),y:+(man.y/H).toFixed(2),op:+man.mat.opacity.toFixed(2),scale:+man.scale.toFixed(2)},
      woman:{x:+(woman.x/W).toFixed(2),op:+woman.mat.opacity.toFixed(2),visible:woman.group.visible},
      heart:heartEl.classList.contains('show') })
  };

  // ---------- 입력 ----------
  const startEl=document.getElementById('start');
  function begin(){ if(scene_n!==0||startEl.dataset.done) return; startEl.dataset.done='1';
    startEl.style.transition='opacity .6s'; startEl.style.opacity='0'; setTimeout(()=>startEl.remove(),650);
    startAudio(); }
  function onTap(){ if(!startEl.dataset.done){ begin(); return; } if(touchReady){ nextScene(); } }
  window.addEventListener('click',onTap);
  window.addEventListener('touchstart',(e)=>{ onTap(); },{passive:true});
})();
</script>
</body>
</html>
